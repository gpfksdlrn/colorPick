<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        background: transparent;
        cursor: crosshair;
        overflow: hidden;
      }

      #magnifier {
        position: fixed;
        pointer-events: none;
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        transform: translate(-50%, calc(-100% - 16px));
      }

      canvas {
        border-radius: 50%;
        border: 2px solid white;
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.5),
          0 4px 20px rgba(0, 0, 0, 0.4);
      }

      #hex-label {
        background: rgba(0, 0, 0, 0.75);
        color: white;
        font-family: monospace;
        font-size: 13px;
        padding: 4px 10px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      #color-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 1px solid white;
      }

      #format-label {
        background: rgba(0, 0, 0, 0.75);
        color: rgba(255, 255, 255, 0.6);
        font-family: monospace;
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 0 0 6px 6px;
        margin-top: -4px;
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      #hint-banner {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        color: rgba(255, 255, 255, 0.75);
        font-family: monospace;
        font-size: 12px;
        padding: 8px 18px;
        border-radius: 8px;
        pointer-events: none;
        display: flex;
        gap: 18px;
        opacity: 1;
        transition: opacity 0.6s ease;
      }

      #hint-banner.hidden {
        opacity: 0;
      }

      .hint-key {
        color: white;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="hint-banner">
      <span><span class="hint-key">Click</span> 복사</span>
      <span><span class="hint-key">F</span> 포맷 변경</span>
      <span><span class="hint-key">Esc</span> 닫기</span>
    </div>

    <div id="magnifier">
      <canvas id="canvas"></canvas>
      <div id="hex-label">
        <div id="color-dot"></div>
        <span id="hex-text">#000000</span>
      </div>
      <div id="format-label">
        <span id="rgb-text">rgb(0, 0, 0)</span>
        <span id="hsl-text">hsl(0, 0%, 0%)</span>
      </div>
    </div>

    <script>
      const { ipcRenderer } = require('electron');

      const magnifier = document.getElementById('magnifier');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const hexText = document.getElementById('hex-text');
      const colorDot = document.getElementById('color-dot');
      const rgbText = document.getElementById('rgb-text');
      const hslText = document.getElementById('hsl-text');

      const GRID = 11;
      const CELL = 10;
      const SIZE = GRID * CELL;

      canvas.width = SIZE;
      canvas.height = SIZE;
      ctx.imageSmoothingEnabled = false;

      const offscreen = new OffscreenCanvas(GRID, GRID);
      const offCtx = offscreen.getContext('2d');
      const imageData = offCtx.createImageData(GRID, GRID);

      function drawMagnifier({ bitmap, size, hex, rgb, hsl }) {
        // BGRA → RGBA 변환 (재사용 버퍼에 직접 쓰기)
        for (let i = 0; i < size * size; i++) {
          const s = i * 4;
          const d = i * 4;
          imageData.data[d]     = bitmap[s + 2];
          imageData.data[d + 1] = bitmap[s + 1];
          imageData.data[d + 2] = bitmap[s];
          imageData.data[d + 3] = 255;
        }
        offCtx.putImageData(imageData, 0, 0);
        ctx.clearRect(0, 0, SIZE, SIZE);
        ctx.drawImage(offscreen, 0, 0, SIZE, SIZE);

        // 그리드 선 (패스 1개로 배치)
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        for (let i = 0; i <= size; i++) {
          ctx.moveTo(i * CELL, 0);
          ctx.lineTo(i * CELL, SIZE);
          ctx.moveTo(0, i * CELL);
          ctx.lineTo(SIZE, i * CELL);
        }
        ctx.stroke();

        const cx = Math.floor(size / 2) * CELL;
        const cy = Math.floor(size / 2) * CELL;
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(cx, cy, CELL, CELL);

        hexText.textContent = hex;
        colorDot.style.background = hex;
        rgbText.textContent = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
        hslText.textContent = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
      }

      let lastCall = 0;
      let isPending = false;
      const THROTTLE = 33;

      document.addEventListener('mousemove', async (e) => {
        magnifier.style.display = 'flex';
        magnifier.style.left = `${e.clientX}px`;
        magnifier.style.top = `${e.clientY}px`;

        const now = Date.now();
        if (now - lastCall < THROTTLE || isPending) return;
        lastCall = now;
        isPending = true;

        const region = await ipcRenderer.invoke('get-region', {
          x: e.screenX,
          y: e.screenY,
        });
        isPending = false;

        if (region) drawMagnifier(region);
      });

      document.addEventListener('click', async (e) => {
        const region = await ipcRenderer.invoke('get-region', {
          x: e.screenX,
          y: e.screenY,
        });
        if (region) {
          await ipcRenderer.invoke('copy-and-close', {
            hex: region.hex,
            rgb: region.rgb,
            hsl: region.hsl,
          });
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') ipcRenderer.invoke('close-overlay');
      });

      // 힌트 배너 3초 후 페이드아웃
      const hintBanner = document.getElementById('hint-banner');
      setTimeout(() => hintBanner.classList.add('hidden'), 3000);
    </script>
  </body>
</html>
